<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RUHC - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    
    .icon {
      width: 80px;
      height: 80px;
      background: #fef3c7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    
    .icon svg {
      width: 40px;
      height: 40px;
      color: #f59e0b;
    }
    
    h1 {
      color: #1e3a8a;
      font-size: 24px;
      margin-bottom: 12px;
    }
    
    p {
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    
    .status {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 12px 20px;
      border-radius: 10px;
      margin-bottom: 24px;
      font-weight: 500;
    }
    
    .retry-btn {
      background: #1e40af;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .retry-btn:hover {
      background: #1e3a8a;
      transform: translateY(-2px);
    }
    
    .retry-btn:active {
      transform: translateY(0);
    }
    
    .note {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #e2e8f0;
      font-size: 14px;
      color: #94a3b8;
    }
    
    .note strong {
      color: #64748b;
    }
    
    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
      }
      
      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414" />
      </svg>
    </div>
    
    <h1>You're Offline</h1>
    
    <div class="status">
      No Internet Connection
    </div>
    
    <p>
      It looks like you've lost your internet connection. 
      Please check your network settings and try again.
    </p>
    
    <button class="retry-btn" onclick="tryReconnect()">
      Try Again
    </button>
    
    <div class="note">
      <strong>Good news:</strong> If you've visited this page before, your data is saved locally and will sync when you're back online.
    </div>
  </div>
  
  <script>
    function tryReconnect() {
      // Show loading state
      const btn = document.querySelector('.retry-btn');
      btn.textContent = 'Checking...';
      
      // Try to fetch
      fetch('/', { method: 'HEAD' })
        .then(() => {
          // Online - reload to the main page
          window.location.href = '/hms';
        })
        .catch(() => {
          // Still offline
          btn.textContent = 'Try Again';
          alert('Still offline. Please check your connection.');
        });
    }
    
    // Auto-check when online
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
